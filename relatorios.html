<!DOCTYPE html>
<html>
<head>
  <base target="_top">

  <style>
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: #f4f8fb;
      margin: 0;
      padding: 30px;
      color: #334155;
    }

    h1 {
      color: #3b82a0;
    }

    .card {
      background: white;
      border: 1px solid #d8e2ea;
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 16px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.06);
    }

    .numero {
      font-size: 32px;
      font-weight: bold;
      color: #166534;
    }
.filtros {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 16px;
}

.opcoes-relatorio {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 10px 20px;
  margin-bottom: 16px;
}

input,
button {
  padding: 12px;
  border: 1px solid #d8e2ea;
  border-radius: 10px;
  box-sizing: border-box;
  font-size: 14px;
}

input[type="date"] {
  width: 100%;
}

input[type="checkbox"] {
  width: auto;
  margin-right: 8px;
}

button {
  background: #7fb6cc;
  color: white;
  cursor: pointer;
  border: none;
}

label {
  display: block;
  font-weight: 600;
  margin-bottom: 6px;
}

@media (max-width: 800px) {
  .filtros,
  .opcoes-relatorio {
    grid-template-columns: 1fr;
  }
}

  </style>
</head>

<body>

  <h1>Relatórios Gerenciais</h1>

  <div class="card">
  <h2>Período</h2>

  <div class="filtros">
    <div>
      <label>Data inicial</label>
      <input id="dataInicial" type="date">
    </div>

    <div>
      <label>Data final</label>
      <input id="dataFinal" type="date">
    </div>
  </div>
</div>

<div class="card">
  <h2>Selecione os relatórios</h2>

  <div class="opcoes-relatorio">
    <label><input type="checkbox" name="relatorio" value="total"> Total de atendimentos</label>
    <label><input type="checkbox" name="relatorio" value="naps"> Por NAPS</label>
    <label><input type="checkbox" name="relatorio" value="tipo"> Por tipo de atendimento</label>
    <label><input type="checkbox" name="relatorio" value="opm"> Por OPM</label>
    <label><input type="checkbox" name="relatorio" value="cidade"> Por cidade</label>
    <label><input type="checkbox" name="relatorio" value="responsavel"> Por responsável</label>
  </div>

  <button onclick="carregarRelatorio()">Gerar relatório</button>
</div>

  <div id="conteudo">
    Carregando relatório...
  </div>

  <script>
    function carregarRelatorio() {
  const dataInicial = document.getElementById("dataInicial").value;
  const dataFinal = document.getElementById("dataFinal").value;

  const tiposRelatorio = Array.from(
    document.querySelectorAll('input[name="relatorio"]:checked')
  ).map(function(input) {
    return input.value;
  });

  if (tiposRelatorio.length === 0) {
    document.getElementById("conteudo").innerHTML = `
      <div class="card">
        Selecione pelo menos um relatório.
      </div>
    `;
    return;
  }

  document.getElementById("conteudo").innerHTML = "Carregando relatório...";

  google.script.run
    .withSuccessHandler(function(relatorio) {
      montarResultado(relatorio, tiposRelatorio);
    })
    .withFailureHandler(function(erro) {
      document.getElementById("conteudo").innerHTML =
        "Erro ao carregar relatório: " + erro.message;
    })
    .gerarRelatorioGerencial(dataInicial, dataFinal, tiposRelatorio);
}

function montarResultado(relatorio, tiposRelatorio) {
  let html = "";

  if (tiposRelatorio.includes("total")) {
    html += `
      <div class="card">
        <div>Total de atendimentos</div>
        <div class="numero">${relatorio.totalAtendimentos}</div>
      </div>
    `;
  }

  if (tiposRelatorio.includes("naps")) {
    html += `
      <div class="card">
        <h2>Atendimentos por NAPS</h2>
        ${montarTabela(relatorio.porNAPS, "NAPS")}
      </div>
    `;
  }

  if (tiposRelatorio.includes("tipo")) {
    html += `
      <div class="card">
        <h2>Atendimentos por tipo de atendimento</h2>
        ${montarTabela(relatorio.porTipo, "Tipo de atendimento")}
      </div>
    `;
  }

  if (tiposRelatorio.includes("opm")) {
    html += `
      <div class="card">
        <h2>Atendimentos por OPM</h2>
        ${montarTabela(relatorio.porOPM, "OPM")}
      </div>
    `;
  }

  if (tiposRelatorio.includes("cidade")) {
    html += `
      <div class="card">
        <h2>Atendimentos por cidade</h2>
        ${montarTabela(relatorio.porCidade, "Cidade")}
      </div>
    `;
  }

  if (tiposRelatorio.includes("responsavel")) {
    html += `
      <div class="card">
        <h2>Atendimentos por responsável</h2>
        ${montarTabela(relatorio.porResponsavel, "Responsável")}
      </div>
    `;
  }

  document.getElementById("conteudo").innerHTML = html;
}

function montarTabela(dados, tituloColuna) {
  let linhas = "";

  const itensOrdenados = Object.keys(dados || {})
    .map(function(chave) {
      return {
        nome: chave,
        total: dados[chave]
      };
    })
    .sort(function(a, b) {
      return b.total - a.total;
    });

  itensOrdenados.forEach(function(item) {
    linhas += `
      <tr>
        <td>${item.nome}</td>
        <td>${item.total}</td>
      </tr>
    `;
  });

  return `
    <table>
      <thead>
        <tr>
          <th>${tituloColuna}</th>
          <th>Total</th>
        </tr>
      </thead>
      <tbody>
        ${linhas}
      </tbody>
    </table>
  `;
}
  </script>

</body>
</html>
