<!DOCTYPE html>
<html>
<head>
  <base target="_top">

  <style>
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: #f4f8fb;
      margin: 0;
      padding: 0;
      color: #334155;
    }

    header {
      background: #6f97ad;
      color: white;
      padding: 20px 30px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid #d8e2ea;
    }

    header h1 {
      margin: 0;
      font-size: 26px;
      font-weight: 600;
    }

    header span {
      font-size: 14px;
      color: #eef4f7;
    }

    .menu {
      font-size: 28px;
      cursor: pointer;
      color: white;
    }

    .container {
      width: 80%;
      max-width: 850px;
      margin: 30px auto;
      background: #ffffff;
      padding: 35px;
      border-radius: 18px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.06);
    }

    h2 {
      color: #3b82a0;
      margin-top: 35px;
      margin-bottom: 20px;
      padding-bottom: 10px;
      border-bottom: 2px solid #edf3f7;
      font-size: 20px;
    }

    .titulo-centralizado {
      text-align: center;
    }

    label {
      display: block;
      margin-bottom: 6px;
      margin-top: 12px;
      font-weight: 600;
      color: #475569;
    }

    input,
    select,
    textarea {
      width: 100%;
      padding: 12px;
      border: 1px solid #d8e2ea;
      border-radius: 10px;
      background: #fcfdff;
      box-sizing: border-box;
      font-size: 14px;
    }

    textarea {
      min-height: 100px;
      resize: vertical;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
    }

    .grid-2 {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 16px;
    }

    button {
      border: none;
      border-radius: 10px;
      padding: 12px 18px;
      cursor: pointer;
      font-size: 15px;
      margin-top: 16px;
    }

    .btn-primary {
      background: #7fb6cc;
      color: white;
    }

    .btn-secondary {
      background: #cbd5e1;
      color: #334155;
    }

    .btn-success {
      background: #6ca88d;
      color: white;
      width: 100%;
      font-size: 18px;
      font-weight: 600;
      margin-top: 25px;
    }

    .vinculado {
      background: #f8fbfd;
      border: 1px solid #e2ebf0;
      border-radius: 12px;
      padding: 18px;
      margin-top: 15px;
    }

    #areaVinculados {
      display: none;
      margin-top: 20px;
    }

    #mensagem {
      margin-top: 20px;
      text-align: center;
      font-weight: bold;
      color: #4f9d69;
    }

    @media (max-width: 900px) {
      .grid,
      .grid-2 {
        grid-template-columns: 1fr;
      }

      .container {
        width: auto;
        margin: 10px;
        padding: 20px;
      }

      header {
        flex-direction: column;
        gap: 10px;
        text-align: center;
      }
    }
  </style>
</head>

<body>

<header>
  <div>
    <h1>Atendimento</h1>
    <span>Sistema de Atendimento Integrado dos CAPS/NAPS</span>
  </div>

  <div class="menu" title="Opções futuras">☰</div>
</header>

<div class="container">

  <h2 class="titulo-centralizado">Identificação do Atendimento</h2>

  <div class="grid-2">
    <div>
      <label>Tipo de Atendimento</label>
      <select id="tipoAtendimento" onchange="verificarTipoAtendimento()">
        <option value="">Selecione</option>
        <option>atendimento psicologico individual</option>
        <option>atendimento familiar</option>
        <option>atendimento em grupo</option>
        <option>atendimento social</option>
      </select>
    </div>

    <div>
      <label>Motivo</label>
      <input id="motivo">
    </div>
  </div>

  <h2>Dados Pessoais e Funcionais</h2>

  <div class="grid">
    <div>
      <label>R.E.</label>
      <input id="re" placeholder="000000-0" oninput="mascaraRE(this)">
    </div>

    <div>
      <label>CPF</label>
      <input id="cpf" placeholder="000.000.000-00" oninput="mascaraCPF(this)">
    </div>

    <div>
      <label>Telefone</label>
      <input id="telefone" placeholder="(00) 00000-0000" oninput="mascaraTelefone(this)">
    </div>
  </div>

  <label>Nome</label>
  <input id="nome">

  <div class="grid">
    <div>
      <label>Sexo</label>
      <select id="sexo">
        <option value="">Selecione</option>
        <option>masculino</option>
        <option>feminino</option>
        <option>nao informado</option>
      </select>
    </div>

    <div>
      <label>Email</label>
      <input id="email" placeholder="EX: todosnos@gmail.com">
    </div>

    <div>
      <label>Data de Nascimento</label>
      <input id="dataNascimento" type="date">
    </div>
  </div>

  <div class="grid">
    <div>
      <label>Estado Civil</label>
      <select id="estadoCivil">
        <option value="">Selecione</option>
        <option>solteiro</option>
        <option>casado</option>
        <option>divorciado</option>
        <option>viuvo</option>
        <option>uniao estavel</option>
      </select>
    </div>

    <div>
      <label>Número de Filhos</label>
      <input id="numeroFilhos" type="number" min="0">
    </div>

    <div>
      <label>Situação/Status</label>
      <select id="situacaoStatus">
        <option value="">Selecione</option>
        <option>ativo administrativo</option>
        <option>ativo operacional</option>
        <option>inativo</option>
      </select>
    </div>
  </div>

  <div class="grid">
    <div>
      <label>OPM Atual/Última</label>
      <input id="opmAtual" placeholder="Ex: 3BPM/M, CPI-2">
    </div>

    <div>
      <label>Data de Ingresso</label>
      <input id="dataIngresso" type="date">
    </div>

    <div>
      <label>Data de Inatividade</label>
      <input id="dataInatividade" type="date">
    </div>
  </div>

  <h2>Endereço</h2>

  <div class="grid-2">
    <div>
      <label>CEP</label>
      <input id="cep" placeholder="00000-000" oninput="mascaraCEP(this)" onblur="buscarCep()">
    </div>

    <div>
      <label>Rua/Avenida</label>
      <input id="rua">
    </div>
  </div>

  <div class="grid">
    <div>
      <label>Número</label>
      <input id="numero">
    </div>

    <div>
      <label>Bairro</label>
      <input id="bairro">
    </div>

    <div>
      <label>Cidade</label>
      <input id="cidade">
    </div>
  </div>

  <div class="grid-2">
    <div>
      <label>UF</label>
      <input id="estado" maxlength="2">
    </div>

    <div>
      <label>Complemento</label>
      <input id="complemento">
    </div>
  </div>

  <div id="areaVinculados">
    <h2>Pessoas Vinculadas ao Atendimento</h2>

    <div id="listaVinculados"></div>

    <button class="btn-primary" onclick="adicionarPessoaVinculada()">
      + Adicionar Pessoa Vinculada
    </button>
  </div>

  <h2>Observações</h2>
  <textarea id="observacoes"></textarea>

  <h2>Responsável pelo Atendimento</h2>

  <label>Nome do responsável</label>
  <input id="responsavel">

  <button class="btn-success" onclick="salvar()">
    Salvar Atendimento
  </button>

  <div id="mensagem"></div>

</div>

<script>
  function verificarTipoAtendimento() {
    const tipo = document.getElementById("tipoAtendimento").value;
    const area = document.getElementById("areaVinculados");

    if (tipo === "atendimento familiar" || tipo === "atendimento em grupo") {
      area.style.display = "block";
    } else {
      area.style.display = "none";
      document.getElementById("listaVinculados").innerHTML = "";
    }
  }

  function adicionarPessoaVinculada() {
    const container = document.getElementById("listaVinculados");

    const div = document.createElement("div");
    div.className = "vinculado";

    div.innerHTML = `
      <div class="grid">
        <div>
          <label>Nome</label>
          <input class="v_nome">
        </div>

        <div>
          <label>CPF</label>
          <input class="v_cpf" placeholder="000.000.000-00">
        </div>

        <div>
          <label>Tipo de Vínculo</label>
          <select class="v_tipo">
            <option value="">Selecione</option>
            <option>familiar</option>
            <option>grupo</option>
          </select>
        </div>
      </div>

      <div class="grid-2">
        <div>
          <label>Parentesco/Vínculo</label>
          <select class="v_parentesco">
            <option value="">Selecione</option>
            <option>conjuge</option>
            <option>filho</option>
            <option>pai</option>
            <option>mae</option>
            <option>irmao</option>
            <option>participante</option>
          </select>
        </div>

        <div>
          <label>Observações</label>
          <input class="v_observacoes">
        </div>
      </div>

      <button class="btn-secondary" onclick="this.parentElement.remove()">
        Remover
      </button>
    `;

    container.appendChild(div);
  }

  function coletarPessoasVinculadas() {
    const blocos = document.querySelectorAll(".vinculado");
    const pessoas = [];

    blocos.forEach(bloco => {
      pessoas.push({
        nome: bloco.querySelector(".v_nome").value,
        cpf: bloco.querySelector(".v_cpf").value,
        tipoVinculo: bloco.querySelector(".v_tipo").value,
        parentesco: bloco.querySelector(".v_parentesco").value,
        observacoes: bloco.querySelector(".v_observacoes").value
      });
    });

    return pessoas;
  }

  function buscarCep() {
    const cep = document.getElementById("cep").value.replace(/\D/g, "");

    if (cep.length !== 8) return;

    fetch("https://viacep.com.br/ws/" + cep + "/json/")
      .then(resposta => resposta.json())
      .then(dados => {
        if (!dados.erro) {
          document.getElementById("rua").value = dados.logradouro || "";
          document.getElementById("bairro").value = dados.bairro || "";
          document.getElementById("cidade").value = dados.localidade || "";
          document.getElementById("estado").value = dados.uf || "";
        } else {
          alert("CEP não encontrado.");
        }
      })
      .catch(() => {
        alert("Erro ao buscar CEP.");
      });
  }

  function salvar() {
    const dados = {
      naps: "teste_naps",
      tipoAtendimento: document.getElementById("tipoAtendimento").value,
      motivo: document.getElementById("motivo").value,
      re: document.getElementById("re").value,
      nome: document.getElementById("nome").value,
      cpf: document.getElementById("cpf").value,
      telefone: document.getElementById("telefone").value,
      email: document.getElementById("email").value,
      dataNascimento: document.getElementById("dataNascimento").value,
      estadoCivil: document.getElementById("estadoCivil").value,
      numeroFilhos: document.getElementById("numeroFilhos").value,
      sexo: document.getElementById("sexo").value,
      opmAtual: document.getElementById("opmAtual").value,
      situacaoStatus: document.getElementById("situacaoStatus").value,
      dataIngresso: document.getElementById("dataIngresso").value,
      dataInatividade: document.getElementById("dataInatividade").value,
      cep: document.getElementById("cep").value,
      rua: document.getElementById("rua").value,
      bairro: document.getElementById("bairro").value,
      cidade: document.getElementById("cidade").value,
      estado: document.getElementById("estado").value,
      numero: document.getElementById("numero").value,
      complemento: document.getElementById("complemento").value,
      observacoes: document.getElementById("observacoes").value,
      responsavel: document.getElementById("responsavel").value,
      pessoasVinculadas: coletarPessoasVinculadas()
    };

    google.script.run
      .withSuccessHandler(function(resposta) {
        document.getElementById("mensagem").innerText = resposta;
        limparFormulario();
      })
      .withFailureHandler(function(erro) {
        document.getElementById("mensagem").innerText = "Erro: " + erro.message;
      })
      .salvarAtendimento(dados);
  }

  function limparFormulario() {
    document.querySelectorAll("input, textarea, select").forEach(el => {
      el.value = "";
    });

    document.getElementById("listaVinculados").innerHTML = "";
    document.getElementById("areaVinculados").style.display = "none";
  }

// Máscara para o campo 



function mascaraRE(campo) {
  let valor = campo.value.toUpperCase();

  valor = valor.replace(/[^0-9A]/g, "");

  if (valor.length > 7) {
    valor = valor.substring(0, 7);
  }

  if (valor.length > 6) {
    valor = valor.substring(0, 6) + "-" + valor.substring(6);
  }

  campo.value = valor;
}

function mascaraCPF(campo) {
  let valor = campo.value.replace(/\D/g, "");

  valor = valor.substring(0, 11);

  valor = valor.replace(/(\d{3})(\d)/, "$1.$2");
  valor = valor.replace(/(\d{3})(\d)/, "$1.$2");
  valor = valor.replace(/(\d{3})(\d{1,2})$/, "$1-$2");

  campo.value = valor;
}

function mascaraTelefone(campo) {
  let valor = campo.value.replace(/\D/g, "");

  valor = valor.substring(0, 11);

  if (valor.length <= 10) {
    valor = valor.replace(/(\d{2})(\d)/, "($1) $2");
    valor = valor.replace(/(\d{4})(\d)/, "$1-$2");
  } else {
    valor = valor.replace(/(\d{2})(\d)/, "($1) $2");
    valor = valor.replace(/(\d{5})(\d)/, "$1-$2");
  }

  campo.value = valor;
}

function mascaraCEP(campo) {
  let valor = campo.value.replace(/\D/g, "");

  valor = valor.substring(0, 8);

  valor = valor.replace(/(\d{5})(\d)/, "$1-$2");

  campo.value = valor;
}

</script>

</body>
</html>
